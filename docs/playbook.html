<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartPack Playbook</title>
<link rel="icon" href="https://smartpack.dk/assets/cropped-favicon-smartpack.png">
<style>
  :root {
    --green-dark: #1a5c35;
    --green: #27ae60;
    --green-mid: #219a52;
    --green-light: #e8f5ee;
    --green-border: #b8deca;
    --text: #1a2e22;
    --muted: #6b7c72;
    --border: #e2e8e4;
    --bg: #f4f7f5;
    --white: #ffffff;
    --sidebar-w: 280px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  html { font-size: 15px; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* NAV */
  .main-nav {
    background: var(--green-dark);
    color: #fff;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 24px;
    height: 54px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  .main-nav img { height: 28px; }
  .main-nav .nav-title { font-weight: 800; font-size: 1rem; letter-spacing: -.01em; }
  .main-nav .nav-badge {
    background: rgba(255,255,255,.15);
    border-radius: 999px;
    padding: 2px 10px;
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: .04em;
  }
  .main-nav .nav-back {
    margin-left: auto;
    color: rgba(255,255,255,.8);
    text-decoration: none;
    font-size: .82rem;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .main-nav .nav-back:hover { color: #fff; }

  /* LAYOUT */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;  /* begge kolonner scroller uafhængigt */
  }

  /* SIDEBAR */
  .sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    background: var(--white);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;  /* sidebar-nav håndterer scroll */
  }
  .sidebar-search {
    padding: 12px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-search input {
    width: 100%;
    padding: 7px 10px;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    font-size: .82rem;
    outline: none;
    color: var(--text);
    background: var(--bg);
  }
  .sidebar-search input:focus { border-color: var(--green); background: var(--white); }
  .sidebar-nav {
    overflow-y: auto;
    flex: 1;
    padding: 8px 0;
  }
  .sidebar-group { display: block; width: 100%; }
  .sidebar-items { display: block; width: 100%; }
  .sidebar-group-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: .68rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--muted);
    padding: 10px 16px 5px;
    cursor: pointer;
    user-select: none;
  }
  .sidebar-group-title:hover { color: var(--green-dark); }
  .sidebar-group-title .chevron {
    font-size: .6rem;
    transition: transform .18s;
    opacity: .6;
  }
  .sidebar-group.collapsed .chevron { transform: rotate(-90deg); }
  .sidebar-group.collapsed .sidebar-items { display: none; }
  .sidebar-item {
    display: block;
    padding: 6px 16px 6px 20px;
    font-size: .81rem;
    color: var(--text);
    text-decoration: none;
    line-height: 1.35;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background .1s;
  }
  .sidebar-item:hover { background: var(--green-light); }
  .sidebar-item.active {
    background: var(--green-light);
    border-left-color: var(--green);
    color: var(--green-dark);
    font-weight: 700;
  }
  .sidebar-item.hidden { display: none; }

  /* CONTENT */
  .content {
    flex: 1;
    padding: 40px 48px;
    max-width: 780px;
    min-width: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .content-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 300px;
    color: var(--muted);
    text-align: center;
    gap: 10px;
  }
  .content-placeholder h2 { font-size: 1.1rem; color: var(--text); }
  .content-placeholder p { font-size: .85rem; }

  /* SECTION HEADER */
  .section-header {
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 2px solid var(--green-border);
  }
  .section-header h1 {
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--green-dark);
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .section-header .section-meta {
    font-size: .78rem;
    color: var(--muted);
  }

  /* MARKDOWN CONTENT */
  .md h3 {
    font-size: .8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--green-dark);
    margin: 24px 0 10px;
    padding-bottom: 5px;
    border-bottom: 1px solid var(--border);
  }
  .md h3:first-child { margin-top: 0; }
  .md p { margin: 8px 0; line-height: 1.7; font-size: .9rem; }
  .md ul, .md ol { padding-left: 20px; margin: 8px 0; }
  .md li { margin-bottom: 5px; font-size: .9rem; line-height: 1.6; }
  .md table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0;
    font-size: .84rem;
  }
  .md th {
    background: var(--green-light);
    color: var(--green-dark);
    padding: 8px 12px;
    text-align: left;
    font-size: .74rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .md td { padding: 8px 12px; border-top: 1px solid var(--border); vertical-align: top; }
  .md tr:hover td { background: var(--bg); }
  .md code {
    background: #f0f2f1;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: .83rem;
    font-family: 'Consolas', 'Fira Code', monospace;
  }
  .md blockquote {
    border-left: 3px solid var(--green-border);
    padding: 8px 14px;
    margin: 10px 0;
    background: var(--green-light);
    border-radius: 0 6px 6px 0;
    color: var(--muted);
    font-size: .87rem;
  }
  .md strong { font-weight: 700; }
  .md em { font-style: italic; }
  .md a { color: var(--green-dark); }
  .related-link {
    color: var(--green-dark);
    font-weight: 600;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 2px;
    background: none;
    border: none;
    padding: 0;
    font-size: inherit;
    font-family: inherit;
  }
  .related-link:hover { color: var(--green); }
  .md hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  /* FOOTER ACTIONS */
  .section-footer {
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .section-footer a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--green);
    color: #fff;
    text-decoration: none;
    font-size: .84rem;
    font-weight: 700;
    padding: 9px 18px;
    border-radius: 8px;
    transition: background .15s;
  }
  .section-footer a:hover { background: var(--green-mid); }

  /* MOBILE */
  @media (max-width: 700px) {
    .sidebar { display: none; }
    .content { padding: 24px 20px; }
  }
</style>
</head>
<body>

<nav class="main-nav">
  <img src="https://smartpack.dk/assets/cropped-favicon-smartpack.png" alt="SmartPack">
  <span class="nav-title">SmartPack Playbook</span>
  <a class="nav-back" href="./index.html">&#8592; Tilbage til prisoversigt</a>
</nav>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-search">
      <input type="search" id="sidebarSearch" placeholder="Sog i emner..." oninput="filterSidebar(this.value)">
    </div>
    <div class="sidebar-nav" id="sidebarNav">Indlaesning...</div>
  </aside>

  <main class="content" id="content">
    <div class="content-placeholder">
      <h2>Vaelg et emne i menuen</h2>
      <p>Brug sogefeltet eller naviger i kategorierne til venstre.</p>
    </div>
  </main>
</div>

<script>
let sections = [];

async function loadPlaybook() {
  try {
    const res = await fetch('./data/playbook.md');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    parsePlaybook(text);
    buildSidebar();
    // Deep-link: check URL hash
    const hash = decodeURIComponent(location.hash.slice(1));
    if (hash) {
      const match = sections.find(s => slugify(s.heading) === hash);
      if (match) showSection(match);
    }
  } catch(e) {
    document.getElementById('sidebarNav').innerHTML = '<div style="padding:16px;color:#c00;font-size:.82rem">Fejl: ' + e.message + '</div>';
    document.getElementById('content').innerHTML = '<div style="padding:40px;color:#c00">Playbook kunne ikke indlæses. Prøv at genindlæse siden.</div>';
  }
}

function slugify(s) {
  return s.toLowerCase()
    .replace(/[\u00e6]/g, 'ae').replace(/[\u00f8]/g, 'oe').replace(/[\u00e5]/g, 'aa')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
}

// Eksplicit gruppe-tildeling — heading (del af) → gruppe
// Rækkefølge matcher SmartPack admin-navigation
const HEADING_GROUPS = [
  // Login & adgang
  ['Login (Admin)', 'Glemt kodeord', 'Opret / Rediger medarbejder', 'Roller og rettigheder', 'Supportchat — adgang'],
  // Dashboard

  ['Ordreliste — Oversigt og søgning', 'Ordredetaljer — Alle felter og tidslinje', 'Opret manuel ordre',

   'Opdel ordre (Tillad Delvis Levering)', 'Gensend afsendelsesmail', 'Genudskriv følgeseddel',
   'Genudskriv fragtlabel (pakket ordre)', 'Dropshipping — To metoder', 'Annullér ordre',
   'Afsendelse og Waybill / End-of-day'],
  // Produkter
  ['Produktoversigt', 'Produkttyper — Normal', 'Produkttyper — Normal + Ekstra pluk',
   'Produkttyper — Kollektions', 'Produkttyper — Virtuel', 'Produkttyper — Bundle',
   'Produktdata — Alle felter', 'Stregkoder på produkter', 'Kolli-stregkoder', 'Produktflags',
   'Foretrukken placering (Preferred Placement)', 'Warehouse Weight (Lager-specifik vægt)',
   'Lagerhistorik på produkt', 'Kostpris vs. Lageromkostning'],
  // Indkøb & leverandører
  ['Indkøbsordrer — Kladde, åbne, afsluttede', 'Leverandøroversigt og prislister',
   'Forecasting og ABC-analyse', 'Presell (forudsalg)'],
  // Lager
  ['Lager — Status og reguleringer', 'Revisionszoner og løbende optælling',
   'Lager økonomi-oversigt', 'Lagerrapporter og historikvisninger', 'Batchsporing', 'Serienummersporing'],
  // Lagerdesign & plukkeprofiler
  ['Lagerdesigner — Introduktion', 'Optegning af lager (Trin-for-trin)', 'Reol og placeringsstruktur',
   'Refill-lokationer og sektioner', 'Test af historiske plukkeruter', 'Lagertegning er blank (Fejl)',
   'Introduktion til plukkeprofiler', 'Plukkeprofil — Generelle indstillinger',
   'Plukkeprofil — Rute og listeindstillinger', 'Plukkeprofil — Pakkeindstillinger',
   'Plukkeprofil — Produktprioritet', 'Plukkeprofil — Ordrefiltrering',
   'Plukkeprofil — Postnummer, lande og kundenummer', 'Plukkeprofil — Produktfiltrering',
   'Plukkeprofil — Kunder / Shops', 'Plukkeprofil — Leveringsmetoder',
   'Plukkeprofil — Lokationer og lagersektioner', 'Plukkeprofil — Ekskluder profiler',
   'Eksklusive plukkeprofiler', 'Plukkeprofil til transfer ordre', 'Eget lagerflyt',
   'Sorteringszoner — Komplet guide'],
  // Levering & retur
  ['Leveringsmetoder — Opsætning', 'Leveringspris konfiguration', 'Shop Checkout konfiguration',
   'Returportal — Opsætning', 'Alternativ returadresse', 'Returårsager og -handlinger'],
  // Administration
  ['Medarbejderadministration', 'Arbejdsplaner', 'Kundeoversigt',
   'Valutakurs — Overstyring', '3PL Prissætning', 'Lager-KPI\'er og benchmarks'],
  // Udstyr & opsætning
  ['Totes og plukkekasser', 'Emballage og pakketyper', 'Vogne', 'Printere', 'Enhedstyper',
   'Newland MT9084 — Opsætning', 'Newland — Lås til SmartPack (Admin Tool)',
   'Newland — Special stregkode (GS1/AI)', 'Zebra Håndterminal — Opsætning',
   'Printservice — Opsætning (Windows)', 'Printservice — Tilføj ekstra printer',
   'Anbefalet Hardware', 'Browser-kompatibilitet', 'Datasimkort'],
  // Konfiguration
  ['Workflows — Komplet guide', 'Email-skabeloner — Komplet opsætning', 'Følgeseddel-skabeloner',
   'Stregkode-/labelskabeloner', 'SMTP-opsætning', 'Systemindstillinger — Oversigt',
   'Genstart SmartPack', 'Lokationer', 'CSV-separator (CultureInfo)', 'Flush DNS', 'API-adgang'],
  // Terminal
  ['Login', 'Skift bruger', 'Log ud', 'Navigation og hjemknap',
   'Terminal lader eller fryser', 'Plukliste låst/optaget', 'App-oversigt og badge-tællere',
   'Realtidsopdateringer (SignalR)',
   'Ankomst — Oversigt og ankomstliste', 'Ankomst — Opret ny (tilknyt indkøbsordre)',
   'Ankomst — Opret ny (manuel)', 'Ankomst — Behandl (trin-for-trin)',
   'Ankomst — Ekstrafelter (batch, udløbsdato, produktionsdato)', 'Ankomst — GS1 stregkoder',
   'Ankomst — Blandet leverance', 'Ankomst — Bundles (VIGTIG REGEL)', 'Ankomst — Batch/LOT-sporing',
   'Retur — Modtagelse af returpakke', 'Retur — Returtyper', 'Retur — Bundlevarer ved retur',
   'Modtag Transfer',
   'Pluk Ordrer — Generer plukliste', 'Plukstrategi — Multipluks Ordre (med totes)',
   'Plukstrategi — Runner / Singlelines (uden totes)', 'Plukstrategi — Masseprint',
   'Plukstrategi — Priority', 'Plukstrategi — Pickup / Afhentning',
   'Plukstrategi — Eksklusive profiler',
   'Aktiv plukning — Plukskærmen', 'Aktiv plukning — Trin-for-trin',
   'Aktiv plukning — Interaktive elementer', 'Aktiv plukning — Vogn og tote',
   'Fejlhåndtering — Vare mangler på hyldeplads', 'Fejlhåndtering — Delvist plukket ordre',
   'Fejlhåndtering — For mange varer plukket', 'Fejlhåndtering — Ordre annulleret i shop',
   'Pak Ordrer — Toteliste oversigt', 'Pak Ordrer — Naviger til en ordre',
   'Pak Ordrer — OID-assistent', 'Pakningsprocessen — Trin-for-trin',
   'Pakningsprocessen — Manuel ordre (Runner/Singlelines)', 'Pakningsprocessen — Fast Pack',
   'Pakningsprocessen — Alle tilgængelige handlinger',
   'Labelprint — Fejl og løsninger', 'Labelprint — Genudskriv (pakket ordre)',
   'Labelprint — Glemt produkt i pakket ordre',
   'Flyt Lager — Genopfyldningsliste fra totes', 'Flyt Lager — Direkte flytning (placering til placering)',
   'Flyt Lager — Sektionsoversigt', 'Nedlæg plukliste',
   'Lagerrevision (Stock Audit)', 'Lagerrevision — LOT/Batch håndtering',
   'Lagerrevision — Karantæne', 'Placeringsrevision', 'Løbende optælling (automatisk revision)',
   'Ordreinfo', 'Produktinfo / Vareinfo', 'Produktion', 'Scan til Palle', 'Klienttilstand (Client Mode)',
   'Printerindstillinger og printervælger', 'Brugerindstillinger', 'Automatiseringsindstillinger',
   'Plukindstillinger', 'Stemmeassistent', 'Stregkodeindstillinger', 'Andre indstillinger',
   'Genvejsknapper', 'Stregkodepræfikser og systemkoder'],
  // Integrationer
  ['Generelle principper for fragtintegrationer', 'Business Central (BC)', 'Shopify',
   'Visma e-conomic', 'GLS', 'PostNord', 'Bring', 'BFT Logistik', 'DanDomain', 'Herodesk',
   'WooCommerce', 'API — Generelt',
   'Ankomstoversigt og afsendelse', 'Transfer ordre — Komplet guide',
   'POS / Kasse Flow', 'WooCommerce integration'],
  // Fejlkoder
  ['Fejlkoder — Quick Reference', 'Hurtige fejlløsninger',
   'Fejlkode 301 — ItemNotFound', 'Fejlkode 326', 'Fejlkode 341 — ItemBundleCantContainSelfOrParent',
   'Fejlkode 352 — ItemBatchNumberRequired', 'Fejlkode 1206 — StockingLotMissingBatchNumber',
   'Fejlkode 1300 — PickingNoPicksFound', 'Fejlkode 1404 — PackageTooManyItems',
   'Fejl: OrderFromLocationAddressIsEmpty', 'Fejl: The JSON value could not be converted',
   'Fejl: Unable to find pickup location', 'Fejl: Printer Not Online (1002)',
   'Fejl: Systemet reagerer ikke (Baglås)', 'Fejl: Terminal lader (loader)',
   'Fejl: Label vil ikke udskrives', 'Fejl: GLS Flexdelivery not possible',
   'Fejl: Bring — Telefonnummer format', 'Fejl: DanDomain — Fakturamail kun én gang',
   'Fejl: BC — OrderLineAlreadyExists', 'Fejl: CSV/Excel ser forkert ud'],
  // Ordbog
  [] // catch-all for ordbog og alt andet
];

const GROUP_LABELS = [
  'Login og adgang', 'Dashboard', 'Ordrer', 'Produkter',
  'Indkøb og leverandører', 'Lager', 'Lagerdesign og plukkeprofiler',
  'Levering og retur', 'Administration', 'Udstyr og opsætning',
  'Konfiguration', 'Terminal', 'Integrationer', 'Fejlkoder', 'Ordbog'
];

// Byg heading → group index map
const headingGroupMap = {};
HEADING_GROUPS.forEach((headings, i) => {
  headings.forEach(h => { headingGroupMap[h] = i; });
});

function getGroup(heading) {
  const i = headingGroupMap[heading];
  if (i !== undefined) return GROUP_LABELS[i];
  return 'Ordbog'; // catch-all
}

function parsePlaybook(text) {
  const rawSections = text.split(/\n\\?---+\n/);
  sections = rawSections.map(s => {
    const lines = s.trim().split('\n');
    const headingLine = lines.find(l => /^## /.test(l));
    const heading = headingLine ? headingLine.replace(/^## /, '').trim() : null;
    return { heading, content: s.trim(), group: heading ? getGroup(heading) : null };
  }).filter(s => s.heading && !['Filstruktur','Hvem bruger hvad','Hurtig reference','Indholdsfortegnelse'].includes(s.heading));
}

// Strip em-dash fra visning (beholder originalt heading til matching)
function displayText(s) {
  return s.replace(/\s*\u2014\s*/g, ' ').trim();
}

function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = '';

  // Bevar rækkefølge fra GROUP_LABELS
  const groups = {};
  GROUP_LABELS.forEach(l => { groups[l] = []; });
  sections.forEach(s => {
    if (!groups[s.group]) groups[s.group] = [];
    groups[s.group].push(s);
  });

  Object.entries(groups).forEach(([label, items]) => {
    if (!items.length) return;

    const groupEl = document.createElement('div');
    groupEl.className = 'sidebar-group';

    const titleEl = document.createElement('div');
    titleEl.className = 'sidebar-group-title';
    titleEl.innerHTML = `<span>${label}</span><span class="chevron">▾</span>`;
    titleEl.onclick = () => groupEl.classList.toggle('collapsed');
    groupEl.appendChild(titleEl);

    const itemsEl = document.createElement('div');
    itemsEl.className = 'sidebar-items';
    items.forEach(sec => {
      const a = document.createElement('a');
      a.className = 'sidebar-item';
      a.textContent = displayText(sec.heading); // strip em-dash i visning
      a.dataset.heading = sec.heading.toLowerCase(); // originalt til matching
      a.onclick = () => showSection(sec);
      itemsEl.appendChild(a);
    });
    groupEl.appendChild(itemsEl);

    nav.appendChild(groupEl);
  });
}

function showSection(sec) {
  // Update active state + sørg for at gruppen er åben
  document.querySelectorAll('.sidebar-item').forEach(el => {
    const isActive = el.dataset.heading === sec.heading.toLowerCase();
    el.classList.toggle('active', isActive);
    if (isActive) {
      const group = el.closest('.sidebar-group');
      if (group) group.classList.remove('collapsed');
      // Scroll item i sigte
      el.scrollIntoView({ block: 'nearest' });
    }
  });

  // Update hash
  history.replaceState(null, '', '#' + slugify(sec.heading));

  // Render
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="section-header">
      <h1>${displayText(sec.heading)}</h1>
      <div class="section-meta">SmartPack Playbook &bull; ${sec.group}</div>
    </div>
    <div class="md" id="mdContent"></div>
    <div class="section-footer">
      <a href="https://support.smartpack.dk" target="_blank" rel="noopener">&#127760; Se alle guides på support.smartpack.dk</a>
    </div>
  `;

  document.getElementById('mdContent').innerHTML = renderMarkdown(sec.content);
  document.getElementById('content').scrollTop = 0;
}

function filterSidebar(query) {
  const q = query.toLowerCase();
  document.querySelectorAll('.sidebar-item').forEach(el => {
    const match = !q || el.dataset.heading.includes(q);
    el.classList.toggle('hidden', !match);
  });
  document.querySelectorAll('.sidebar-group').forEach(g => {
    const hasVisible = [...g.querySelectorAll('.sidebar-item')].some(el => !el.classList.contains('hidden'));
    g.style.display = hasVisible ? '' : 'none';
    // Auto-åbn grupper når man søger
    if (q && hasVisible) g.classList.remove('collapsed');
    if (!q) g.classList.remove('collapsed'); // nulstil ved tom søgning
  });
}

function renderMarkdown(md) {
  md = md.replace(/^## .+$/m, '').trim();
  md = md.replace(/^> \*\*Version.*$/gm, '').replace(/^> \*\*Bem.*$/gm, '');
  let html = '';
  const lines = md.split('\n');
  let inTable = false, inList = false, listTag = 'ul';
  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];
    if (line.trim() === '---') { if (inList) { html += `</${listTag}>`; inList = false; } if (inTable) { html += '</table>'; inTable = false; } continue; }
    if (/^### /.test(line)) {
      if (inList) { html += `</${listTag}>`; inList = false; }
      if (inTable) { html += '</table>'; inTable = false; }
      html += `<h3>${line.replace(/^### /, '')}</h3>`;
    } else if (/^\|/.test(line)) {
      if (inList) { html += `</${listTag}>`; inList = false; }
      if (!inTable) { html += '<table>'; inTable = true; }
      const cells = line.split('|').filter((c,i,a) => i > 0 && i < a.length-1).map(c => c.trim());
      if (cells.every(c => /^[-:]+$/.test(c))) continue;
      const isHead = lines[i+1] && /^\|[-| :]+\|/.test(lines[i+1]);
      const tag = isHead ? 'th' : 'td';
      html += `<tr>${cells.map(c => `<${tag}>${mdInline(c)}</${tag}>`).join('')}</tr>`;
    } else {
      if (inTable) { html += '</table>'; inTable = false; }
      if (/^- /.test(line) || /^\* /.test(line)) {
        if (!inList || listTag !== 'ul') { if (inList) html += `</${listTag}>`; html += '<ul>'; inList = true; listTag = 'ul'; }
        html += `<li>${mdInline(line.replace(/^[-*] /, ''))}</li>`;
      } else if (/^\d+\.\s/.test(line)) {
        if (!inList || listTag !== 'ol') { if (inList) html += `</${listTag}>`; html += '<ol>'; inList = true; listTag = 'ol'; }
        html += `<li>${mdInline(line.replace(/^\d+\.\s*/, ''))}</li>`;
      } else if (line.trim() === '') {
        if (inList) { html += `</${listTag}>`; inList = false; }
      } else if (/^> /.test(line)) {
        html += `<blockquote>${mdInline(line.replace(/^> /, ''))}</blockquote>`;
      } else {
        if (inList) { html += `</${listTag}>`; inList = false; }
        if (line.trim()) html += `<p>${mdInline(line)}</p>`;
      }
    }
  }
  if (inList) html += `</${listTag}>`;
  if (inTable) html += '</table>';
  return html;
}

function mdInline(s) {
  return s
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>')
    .replace(/&gt;/g, '>')
    // Relaterede emner: → Se: X  → klikbart link
    .replace(/\u2192 Se: (.+)/g, (_, heading) =>
      `<a class="related-link" onclick="navigateToHeading('${heading.replace(/'/g,"\\'")}')">\u2192 ${heading}</a>`);
}

function navigateToHeading(heading) {
  const sec = sections.find(s => s.heading === heading);
  if (sec) showSection(sec);
}

loadPlaybook();
</script>
